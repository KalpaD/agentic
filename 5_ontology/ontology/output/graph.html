<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cognee Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--bg2:#323332;--surface:rgba(255,255,255,0.06);
  --border:rgba(219,216,216,0.12);--text:#F4F4F4;--text2:#DBD8D8;
  --accent:#6510F4;--accent2:#A550FF;--green:#0DFF00;
  --schema-node:#1a1a2e;--schema-stroke:#A550FF;--schema-link:#555;
}
html.light{
  --bg:#f5f5f5;--bg2:#e8e8e8;--surface:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.12);--text:#1a1a1a;--text2:#555555;
  --accent:#6510F4;--accent2:#7c3aed;--green:#16a34a;
  --schema-node:#ffffff;--schema-stroke:#6510F4;--schema-link:#999;
}
html.light body,html.light{background:var(--bg);color:var(--text)}
@font-face{font-family:'Inter';src:local('Inter'),local('Inter-Regular');font-display:swap}
body,html{width:100%;height:100%;overflow:hidden;background:#000000;color:#F4F4F4;font-family:'Inter',system-ui,-apple-system,sans-serif}
canvas{display:block;width:100vw;height:100vh;cursor:grab}
canvas:active{cursor:grabbing}

#header{
  position:fixed;top:0;left:0;right:0;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
  background:none;
  pointer-events:none;
}
#header>*{pointer-events:auto}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:0.02em;color:var(--text)}
.logo img{height:28px;width:auto}
.stats{display:flex;gap:16px;font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}
.stats span{display:flex;align-items:center;gap:4px}
.stats .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

#controls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:2px;padding:4px;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
}
.ctrl-btn{
  padding:6px 14px;font-size:11px;font-weight:500;font-family:inherit;
  color:var(--text2);background:transparent;border:none;border-radius:7px;
  cursor:pointer;transition:all 0.15s ease;white-space:nowrap;
}
.ctrl-btn:hover{color:var(--text);background:var(--surface)}
.ctrl-btn.active{color:#F4F4F4;background:rgba(101,16,244,0.2)}
.ctrl-sep{width:1px;background:var(--border);margin:2px 4px}

#search-box{
  position:fixed;top:56px;left:20px;z-index:100;width:280px;
}
#search-input{
  width:100%;padding:8px 12px 8px 32px;
  font-size:12px;font-family:inherit;color:var(--text);
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  outline:none;transition:border-color 0.15s;
}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}

#info-panel{
  position:fixed;top:56px;right:20px;width:320px;max-height:calc(100vh - 80px);
  overflow-y:auto;z-index:100;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;opacity:0;transform:translateX(8px);
  transition:opacity 0.2s ease,transform 0.2s ease;
}
#info-panel.visible{opacity:1;transform:translateX(0)}
#info-panel::-webkit-scrollbar{width:4px}
#info-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.panel-type{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 6px;border-radius:4px;background:rgba(101,16,244,0.2);color:#A550FF;
}
.panel-title{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.panel-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:8px}
.panel-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;font-size:12px;gap:12px}
.panel-row .k{color:var(--text2);flex-shrink:0}
.panel-row .v{color:var(--text);text-align:right;word-break:break-word;max-width:200px}

/* ── Legend (Phase 1 polish) ─────────────────────────────────────
   Bottom-left floating card explaining the encodings: node colors by
   stage, the ontology-valid green ring, and the importance-weight node-
   size scale. Populated by JS so only stages actually present in the
   graph appear. */
#legend{
  position:fixed;bottom:20px;left:20px;z-index:90;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:11px;line-height:1.5;color:var(--text2);
  max-width:380px;
  display:flex;gap:14px;align-items:center;flex-wrap:wrap;
}
.legend-section{display:flex;align-items:center;gap:8px;}
.legend-title{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);opacity:0.75;margin-right:2px;}
.legend-items{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.legend-item{display:inline-flex;align-items:center;gap:4px;color:var(--text);}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-ring{
  display:inline-block;width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:2px solid #0DFF00;flex-shrink:0;
}
.legend-sizes{display:inline-flex;align-items:center;gap:4px;}
.legend-sizes .legend-dot{background:var(--text);}
.legend-sep{width:1px;height:18px;background:var(--border);}

.empty-state{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--text2);font-size:14px;
}

#loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
  background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.4s ease;
}
#loading-overlay.hidden{opacity:0;pointer-events:none}
#loading-text{font-size:14px;color:var(--text2);margin-bottom:16px}
#loading-bar-bg{width:240px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
#loading-bar{width:0%;height:100%;background:var(--accent);border-radius:2px;transition:width 0.15s linear}
#loading-stats{font-size:11px;color:var(--text2);margin-top:10px;opacity:0.7}

#minimap-container{
  position:fixed;bottom:64px;right:20px;z-index:100;
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
  background:rgba(0,0,0,0.7);cursor:pointer;display:none;
}
#minimap-canvas{display:block}

#fps-counter{
  position:fixed;top:12px;right:180px;z-index:100;
  font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums;
  display:none;pointer-events:none;
}
</style>
</head>
<body>

  <button class="tab-btn active" data-view="graph" style="background:var(--accent);color:#fff;border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Graph</button>
  <button class="tab-btn" data-view="schema" style="background:transparent;color:var(--text2);border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Schema</button>
</div>

<button id="theme-toggle" style="position:fixed;top:12px;right:20px;z-index:1200;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:12px;padding:6px 14px;border-radius:8px;color:var(--text);font-family:inherit;font-weight:500;transition:all 0.15s;">Light mode</button>

<div id="search-box">

  <input type="text" id="search-input" placeholder="Search nodes..." autocomplete="off" spellcheck="false">
</div>

<div id="controls">
  <button class="ctrl-btn active" data-labelbudget="key" title="Labels: landmark nodes + high-importance entities">Key</button>
  <button class="ctrl-btn" data-labelbudget="all" title="Labels: every node">All</button>
  <button class="ctrl-btn" data-labelbudget="off" title="Labels: hidden (hover to peek)">Off</button>

  <button class="ctrl-btn active" data-layout="story" title="Pipeline story: Documents &rarr; Chunks &rarr; Entities &rarr; Types &rarr; Summaries">Story</button>
  <button class="ctrl-btn" data-layout="ranked" title="Left-to-right by topological rank">Flow</button>
  <button class="ctrl-btn" data-layout="organic" title="Organic force layout">Force</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn active" data-colorby="type" title="Color by node type">Type</button>
  <button class="ctrl-btn" data-colorby="nodeset" title="Color by source node set">Node set</button>
  <button class="ctrl-btn" data-colorby="user" title="Color by source user">User</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out (-)">&#x2212;</button>
  <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in (+)">+</button>
  <button class="ctrl-btn" id="btn-fit" title="Fit to view (F)">Fit</button>
</div>

     removed for simplicity. The label visibility is fully controlled by
     the Key/All/Off budget above; node/edge visibility were never useful
     toggles in practice; heatmap and type-cloud layers stay reachable
     via the layers={} state object for power users / URL hash. -->
<button data-layer="heatmap" hidden></button>
<button data-layer="typeclouds" hidden></button>

<div id="info-panel"></div>
<div id="legend"></div>

<div id="loading-overlay">
  <div id="loading-text">Laying out graph...</div>
  <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  <div id="loading-stats"></div>
</div>

<div id="minimap-container"><canvas id="minimap-canvas"></canvas></div>
<div id="fps-counter"></div>

<canvas id="canvas"></canvas>
</div><!-- end graph-view -->

<div id="schema-view" style="display:none;position:fixed;inset:0;background:var(--bg);padding:56px 0 0;overflow:hidden;z-index:900;">
  <div id="schema-header" style="position:absolute;top:56px;left:0;right:0;padding:14px 28px 10px;display:flex;align-items:baseline;justify-content:space-between;gap:16px;">
    <div style="display:flex;align-items:baseline;gap:14px;">
      <h2 style="font-size:18px;font-weight:700;letter-spacing:-0.01em;margin:0;">Memory schema</h2>
      <span id="schema-stats" style="font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums;"></span>

<script>
// Theme toggle
(function(){

  window._isLightMode = false;
  btn.addEventListener('click', () => {

// Tab switching logic
(function(){

})();


// Schema view (Phase 2 redesign): explicit-position ontology diagram.
//
// Replaces the previous "type-cards above a force-graph hairball" layout
// with a single primary diagram that's structured, not floating:
//   - Node-type boxes positioned in canonical pipeline order
//     (Documents → Chunks → Entities → Types → Summaries → Context → Schema)
//   - Each box surfaces type name, instance count, modal pipeline+task,
//     and a short field inventory
//   - Edges between node types drawn as labelled curves carrying the
//     relation name + edge count
//   - Below the diagram: edge-type cards listing every relationship type
//     with its source→target pairs
//   - Click a node box or edge card to highlight related elements
//
// Reads ``schemaGraphData`` produced by preprocessor.extract_type_schema_graph_data:
//   - nodes of type GraphNodeType (one per node type, with source_pipeline/
//     source_task/instance_count surfaced at the top level)
//   - nodes of type GraphRelationshipType (one per source_type → target_type
//     pair, with source_type/target_type/relationship_label/edge_count)
//   - links connect type→rel ("from") and rel→type ("to")
(function(){
  const schemaData = null;
  const schemaGraphData = {"nodes": [{"id": "type:DocumentChunk", "name": "DocumentChunk", "type": "GraphNodeType", "rank": 1, "fields": [{"name": "count", "type": "1", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "source_user", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_user": "default_user@example.com", "instance_count": 1}, {"id": "type:Entity", "name": "Entity", "type": "GraphNodeType", "rank": 2, "fields": [{"name": "count", "type": "37", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}, {"name": "stage", "type": "string 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_from_data", "source_user": null, "instance_count": 37}, {"id": "type:EntityType", "name": "EntityType", "type": "GraphNodeType", "rank": 3, "fields": [{"name": "count", "type": "7", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}, {"name": "relations", "type": "array 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_from_data", "source_user": null, "instance_count": 7}, {"id": "type:TextDocument", "name": "TextDocument", "type": "GraphNodeType", "rank": 0, "fields": [{"name": "count", "type": "1", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "source_user", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "classify_documents", "source_user": "default_user@example.com", "instance_count": 1}, {"id": "type:TextSummary", "name": "TextSummary", "type": "GraphNodeType", "rank": 4, "fields": [{"name": "count", "type": "1", "required": true}, {"name": "source_task", "type": "string 100%", "required": true}, {"name": "source_pipeline", "type": "string 100%", "required": true}, {"name": "source_user", "type": "string 100%", "required": true}, {"name": "topological_rank", "type": "integer 100%", "required": true}, {"name": "version", "type": "integer 100%", "required": true}], "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_user": "default_user@example.com", "instance_count": 1}, {"id": "rel:0:Entity:Entity", "name": "Entity self-links", "type": "GraphRelationshipType", "rank": 2.5, "source_type": "Entity", "target_type": "Entity", "relationship_label": "governs (8), references (5), +25 more", "edge_count": 46, "fields": [{"name": "edges", "type": "46", "required": true}, {"name": "top relation", "type": "governs", "required": true}, {"name": "relation types", "type": "27", "required": true}]}, {"id": "rel:1:DocumentChunk:Entity", "name": "DocumentChunk to Entity", "type": "GraphRelationshipType", "rank": 1.5, "source_type": "DocumentChunk", "target_type": "Entity", "relationship_label": "contains (37)", "edge_count": 37, "fields": [{"name": "edges", "type": "37", "required": true}, {"name": "top relation", "type": "contains", "required": true}, {"name": "relation types", "type": "1", "required": true}]}, {"id": "rel:2:Entity:EntityType", "name": "Entity to EntityType", "type": "GraphRelationshipType", "rank": 2.5, "source_type": "Entity", "target_type": "EntityType", "relationship_label": "is_a (37)", "edge_count": 37, "fields": [{"name": "edges", "type": "37", "required": true}, {"name": "top relation", "type": "is_a", "required": true}, {"name": "relation types", "type": "1", "required": true}]}, {"id": "rel:3:DocumentChunk:TextDocument", "name": "DocumentChunk to TextDocument", "type": "GraphRelationshipType", "rank": 0.5, "source_type": "DocumentChunk", "target_type": "TextDocument", "relationship_label": "is_part_of (1)", "edge_count": 1, "fields": [{"name": "edges", "type": "1", "required": true}, {"name": "top relation", "type": "is_part_of", "required": true}, {"name": "relation types", "type": "1", "required": true}]}, {"id": "rel:4:TextSummary:DocumentChunk", "name": "TextSummary to DocumentChunk", "type": "GraphRelationshipType", "rank": 2.5, "source_type": "TextSummary", "target_type": "DocumentChunk", "relationship_label": "made_from (1)", "edge_count": 1, "fields": [{"name": "edges", "type": "1", "required": true}, {"name": "top relation", "type": "made_from", "required": true}, {"name": "relation types", "type": "1", "required": true}]}], "links": [{"source": "type:Entity", "target": "rel:0:Entity:Entity", "label": "from"}, {"source": "rel:0:Entity:Entity", "target": "type:Entity", "label": "to"}, {"source": "type:DocumentChunk", "target": "rel:1:DocumentChunk:Entity", "label": "from"}, {"source": "rel:1:DocumentChunk:Entity", "target": "type:Entity", "label": "to"}, {"source": "type:Entity", "target": "rel:2:Entity:EntityType", "label": "from"}, {"source": "rel:2:Entity:EntityType", "target": "type:EntityType", "label": "to"}, {"source": "type:DocumentChunk", "target": "rel:3:DocumentChunk:TextDocument", "label": "from"}, {"source": "rel:3:DocumentChunk:TextDocument", "target": "type:TextDocument", "label": "to"}, {"source": "type:TextSummary", "target": "rel:4:TextSummary:DocumentChunk", "label": "from"}, {"source": "rel:4:TextSummary:DocumentChunk", "target": "type:DocumentChunk", "label": "to"}]};
  const emptyEl = document.getElementById('schema-empty');
  const svgEl = document.getElementById('schema-svg');

  function escapeHtml(s){
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function stripCoverage(s){
    return String(s || '').replace(/\s*\d+%\s*$/, '');
  }
  function truncate(s, n){
    const text = String(s == null ? '' : s);
    return text.length > n ? text.slice(0, n) + '…' : text;
  }

  // Stage column position by node-type rank (matches preprocessor.node_type_rank).
  // Used to lay out type boxes in pipeline order.
  const STAGE_LABELS = ['Documents', 'Chunks', 'Entities', 'Types', 'Summaries', 'Context'];
  function stageLabel(rank){
    if (typeof rank !== 'number' || !isFinite(rank)) return '';
    const idx = Math.round(rank);
    return STAGE_LABELS[idx] || '';
  }

  // Per-type accent color — keeps the schema palette consistent with the
  // graph view (Entity = purple, Chunk = green, etc.)
  const ACCENT_BY_TYPE = {
    TextDocument: '#A550FF',
    DocumentChunk: '#0DFF00',
    TextSummary: '#6510F4',
    GlobalContextSummary: '#00C2FF',
    Entity: '#6510F4',
    EntityType: '#D5C2FF',
    DatabaseSchema: '#6510F4',
    SchemaTable: '#A550FF',
    SchemaRelationship: '#747470',
    TableType: '#A550FF',
    TableRow: '#A550FF',
    ColumnValue: '#747470',
  };
  function accentFor(name){ return ACCENT_BY_TYPE[name] || '#A550FF'; }

  // ── Build the schema model from preprocessor data ────────────────
  function buildSchemaModel() {
    if (!schemaGraphData || !Array.isArray(schemaGraphData.nodes) || !schemaGraphData.nodes.length) {
      return { nodeTypes: [], edgeTypes: [] };
    }
    const nodeTypes = [];
    const edgeTypes = [];
    schemaGraphData.nodes.forEach(function(n) {
      if (n.type === 'GraphNodeType') {
        nodeTypes.push({
          id: String(n.id),
          name: String(n.name || n.id),
          rank: Number.isFinite(Number(n.rank)) ? Number(n.rank) : 4,
          fields: Array.isArray(n.fields) ? n.fields : [],
          instance_count: n.instance_count != null ? n.instance_count : null,
          source_pipeline: n.source_pipeline || null,
          source_task: n.source_task || null,
          source_user: n.source_user || null,
        });
      } else if (n.type === 'GraphRelationshipType') {
        edgeTypes.push({
          id: String(n.id),
          source_type: n.source_type || '',
          target_type: n.target_type || '',
          // relationship_label looks like "is_a (4)" or "contains (4), made_from (2) +1 more"
          relationship_label: n.relationship_label || '',
          edge_count: n.edge_count || 0,
        });
      }
    });
    // Sort node types by rank, then name; gives stable Story order
    nodeTypes.sort(function(a, b) {
      if (a.rank !== b.rank) return a.rank - b.rank;
      return a.name.localeCompare(b.name);
    });
    return { nodeTypes: nodeTypes, edgeTypes: edgeTypes };
  }

  // Extract the primary relation name from a relationship_label string.
  // "contains (4), made_from (2) +1 more" → "contains"
  function primaryRelation(rel){
    const m = /^([^\s(,]+)/.exec(rel.relationship_label || '');
    return m ? m[1] : 'related';
  }

  // ── Layout: place node-type boxes in stage columns ───────────────
  // Returns a map of type-name → {x, y, w, h, type} and metadata for the
  // overall diagram bounds.
  function layoutBoxes(nodeTypes, totalWidth) {
    const PAD_LEFT = 40;
    const PAD_TOP = 56;       // room for stage header labels
    const BOX_W = 220;
    const BOX_H = 130;
    const COL_GAP = 80;
    const ROW_GAP = 26;
    // Bin by rank
    const byRank = {};
    nodeTypes.forEach(function(t) {
      const r = Math.round(t.rank);
      if (!byRank[r]) byRank[r] = [];
      byRank[r].push(t);
    });
    const ranks = Object.keys(byRank).map(Number).sort(function(a, b) { return a - b; });
    const positions = {};
    let maxY = 0;
    ranks.forEach(function(r, colIdx) {
      const col = byRank[r];
      const colX = PAD_LEFT + colIdx * (BOX_W + COL_GAP);
      col.forEach(function(t, rowIdx) {
        const y = PAD_TOP + rowIdx * (BOX_H + ROW_GAP);
        positions[t.name] = { x: colX, y: y, w: BOX_W, h: BOX_H, type: t, rank: r };
        if (y + BOX_H > maxY) maxY = y + BOX_H;
      });
    });
    const diagramW = Math.max(totalWidth, PAD_LEFT + ranks.length * (BOX_W + COL_GAP));
    const diagramH = maxY + 32;
    return {
      positions: positions,
      width: diagramW,
      height: diagramH,
      ranks: ranks,
      byRank: byRank,
      box_w: BOX_W,
      box_h: BOX_H,
      pad_left: PAD_LEFT,
      col_gap: COL_GAP,
      pad_top: PAD_TOP,
    };
  }

  // Pick a connection point on the box perimeter aimed at a target point.
  // Keeps arrows from emerging out of the middle of a box.
  function boxAnchor(box, towardX, towardY) {
    const cx = box.x + box.w / 2;
    const cy = box.y + box.h / 2;
    const dx = towardX - cx;
    const dy = towardY - cy;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return { x: cx, y: cy };
    const halfW = box.w / 2;
    const halfH = box.h / 2;
    const slope = Math.abs(dy / (dx || 0.001));
    if (slope * halfW < halfH) {
      // Exits left/right side
      const sign = dx > 0 ? 1 : -1;
      return { x: cx + sign * halfW, y: cy + sign * halfW * (dy / (dx || 0.001)) };
    }
    const sign = dy > 0 ? 1 : -1;
    return { x: cx + sign * halfH * (dx / (dy || 0.001)), y: cy + sign * halfH };
  }

  // ── Render the SVG diagram ───────────────────────────────────────
  function renderSchemaDiagram(model) {
    const svg = d3.select('#schema-svg');
    svg.selectAll('*').remove();
    const isLight = document.documentElement.classList.contains('light');

    if (!model.nodeTypes.length) {
      return;
    }

    const containerW = document.getElementById('schema-diagram-section').clientWidth || 1200;
    const layout = layoutBoxes(model.nodeTypes, containerW);
    svg.attr('width', layout.width).attr('height', layout.height);
    const root = svg.append('g');

    // Stage-column headers
    layout.ranks.forEach(function(r, colIdx) {
      const colX = layout.pad_left + colIdx * (layout.box_w + layout.col_gap);
      const label = stageLabel(r);
      if (!label) return;
      root.append('text')
        .attr('class', 'sd-stage-header')
        .attr('x', colX + layout.box_w / 2)
        .attr('y', 28)
        .attr('text-anchor', 'middle')
        .text(label);
    });

    // ── Edges: render as Bezier curves between box anchors ─────────
    // For each unique source_type → target_type pair, group edges by
    // relation so multiple relations between the same pair stack
    // vertically next to the midpoint.
    const positions = layout.positions;
    const edgeGroups = {};
    model.edgeTypes.forEach(function(e) {
      if (!positions[e.source_type] || !positions[e.target_type]) return;
      const key = e.source_type + '|' + e.target_type;
      if (!edgeGroups[key]) edgeGroups[key] = [];
      edgeGroups[key].push(e);
    });

    const drawnEdges = [];
    Object.keys(edgeGroups).forEach(function(key) {
      const group = edgeGroups[key];
      group.forEach(function(e, idxInPair) {
        const src = positions[e.source_type];
        const tgt = positions[e.target_type];
        const srcCx = src.x + src.w / 2;
        const srcCy = src.y + src.h / 2;
        const tgtCx = tgt.x + tgt.w / 2;
        const tgtCy = tgt.y + tgt.h / 2;
        const isSelf = src === tgt;
        let pathD;
        let labelX, labelY;
        if (isSelf) {
          // Self-loop on the right side of the box
          const lx = src.x + src.w;
          const ly = src.y + 20;
          pathD = 'M ' + lx + ' ' + (src.y + 30) +
                  ' C ' + (lx + 60) + ' ' + (src.y + 10) +
                  ', ' + (lx + 60) + ' ' + (src.y + src.h - 10) +
                  ', ' + lx + ' ' + (src.y + src.h - 30);
          labelX = lx + 36;
          labelY = src.y + src.h / 2;
        } else {
          const aSrc = boxAnchor(src, tgtCx, tgtCy);
          const aTgt = boxAnchor(tgt, srcCx, srcCy);
          // Offset multiple relations between the same pair so labels don't overlap
          const offset = (idxInPair - (group.length - 1) / 2) * 22;
          const midX = (aSrc.x + aTgt.x) / 2;
          const midY = (aSrc.y + aTgt.y) / 2;
          const dx = aTgt.x - aSrc.x;
          const dy = aTgt.y - aSrc.y;
          const len = Math.sqrt(dx * dx + dy * dy) || 1;
          // Perpendicular for curvature
          const px = -dy / len;
          const py = dx / len;
          const curveStrength = 30 + Math.abs(offset);
          const cpx = midX + px * curveStrength + (px * offset);
          const cpy = midY + py * curveStrength + (py * offset);
          pathD = 'M ' + aSrc.x + ' ' + aSrc.y +
                  ' Q ' + cpx + ' ' + cpy + ' ' + aTgt.x + ' ' + aTgt.y;
          labelX = cpx;
          labelY = cpy;
        }
        drawnEdges.push({ edge: e, path: pathD, labelX: labelX, labelY: labelY });
      });
    });

    // Arrow marker (one shared definition)
    const defs = svg.append('defs');
    defs.append('marker')
      .attr('id', 'sd-arrow')
      .attr('viewBox', '0 -5 10 10')
      .attr('refX', 8)
      .attr('refY', 0)
      .attr('markerWidth', 7)
      .attr('markerHeight', 7)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', isLight ? '#666' : '#aaa');

    // Draw edge paths first so labels render on top
    const edgeGroup = root.append('g').attr('class', 'sd-edges');
    drawnEdges.forEach(function(de) {
      edgeGroup.append('path')
        .datum(de.edge)
        .attr('class', 'sd-edge-path')
        .attr('data-edge-id', de.edge.id)
        .attr('data-source-type', de.edge.source_type)
        .attr('data-target-type', de.edge.target_type)
        .attr('d', de.path)
        .attr('marker-end', 'url(#sd-arrow)');
    });

    // Edge labels
    const labelGroup = root.append('g').attr('class', 'sd-edge-labels');
    drawnEdges.forEach(function(de) {
      const rel = primaryRelation(de.edge);
      const cnt = de.edge.edge_count ? '×' + de.edge.edge_count : '';
      const labelText = rel + (cnt ? '  ' + cnt : '');
      // Background pill so the label reads cleanly over crossing arrows
      const tmp = labelGroup.append('text')
        .attr('class', 'sd-edge-label')
        .text(labelText)
        .style('visibility', 'hidden');
      const bbox = tmp.node().getBBox();
      tmp.remove();
      const pad = 6;
      labelGroup.append('rect')
        .attr('class', 'sd-edge-label-bg')
        .attr('data-edge-id', de.edge.id)
        .attr('x', de.labelX - bbox.width / 2 - pad)
        .attr('y', de.labelY - bbox.height / 2 - 1)
        .attr('width', bbox.width + pad * 2)
        .attr('height', bbox.height + 2)
        .attr('rx', 4);
      labelGroup.append('text')
        .attr('class', 'sd-edge-label')
        .attr('data-edge-id', de.edge.id)
        .attr('x', de.labelX)
        .attr('y', de.labelY)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .text(labelText);
    });

    // ── Node-type boxes ────────────────────────────────────────────
    const nodeGroup = root.append('g').attr('class', 'sd-nodes');
    Object.keys(positions).forEach(function(name) {
      const p = positions[name];
      const t = p.type;
      const accent = accentFor(name);
      const g = nodeGroup.append('g')
        .attr('class', 'sd-node-box')
        .attr('data-node-type', name)
        .attr('transform', 'translate(' + p.x + ',' + p.y + ')');

      // Card body
      g.append('rect')
        .attr('width', p.w)
        .attr('height', p.h)
        .attr('rx', 10)
        .attr('fill', isLight ? '#ffffff' : '#1a1a22')
        .attr('stroke', isLight ? 'rgba(30,30,30,0.18)' : 'rgba(244,244,244,0.16)')
        .attr('stroke-width', 1);
      // Accent stripe on the left
      g.append('rect')
        .attr('width', 4)
        .attr('height', p.h)
        .attr('rx', 1)
        .attr('fill', accent);

      // Header: type name + count
      g.append('text')
        .attr('x', 16)
        .attr('y', 22)
        .attr('font-size', 14)
        .attr('font-weight', 700)
        .attr('fill', isLight ? '#1a1a1a' : '#F4F4F4')
        .text(truncate(name, 22));
      if (t.instance_count != null) {
        const txt = t.instance_count + ' instance' + (t.instance_count === 1 ? '' : 's');
        g.append('text')
          .attr('x', p.w - 14)
          .attr('y', 22)
          .attr('text-anchor', 'end')
          .attr('font-size', 10.5)
          .attr('font-weight', 500)
          .attr('fill', isLight ? '#666' : '#A8A8B3')
          .text(txt);
      }

      // Pipeline / task pills
      let pillY = 46;
      if (t.source_pipeline) {
        const v = stripCoverage(t.source_pipeline);
        g.append('text')
          .attr('x', 16).attr('y', pillY)
          .attr('font-size', 9)
          .attr('font-weight', 600)
          .attr('letter-spacing', '0.05em')
          .attr('text-transform', 'uppercase')
          .attr('fill', isLight ? '#666' : '#A8A8B3')
          .text('PIPELINE');
        g.append('text')
          .attr('x', 76).attr('y', pillY)
          .attr('font-size', 10.5)
          .attr('font-family', "'SF Mono', ui-monospace, monospace")
          .attr('fill', isLight ? '#1a1a1a' : '#E0E0E0')
          .text(truncate(v, 22));
        pillY += 16;
      }
      if (t.source_task) {
        const v = stripCoverage(t.source_task);
        g.append('text')
          .attr('x', 16).attr('y', pillY)
          .attr('font-size', 9)
          .attr('font-weight', 600)
          .attr('letter-spacing', '0.05em')
          .attr('text-transform', 'uppercase')
          .attr('fill', isLight ? '#666' : '#A8A8B3')
          .text('TASK');
        g.append('text')
          .attr('x', 76).attr('y', pillY)
          .attr('font-size', 10.5)
          .attr('font-family', "'SF Mono', ui-monospace, monospace")
          .attr('fill', isLight ? '#1a1a1a' : '#E0E0E0')
          .text(truncate(v, 22));
        pillY += 16;
      }

      // Top fields (skip count/source_* which are surfaced above)
      const bodyFields = (t.fields || []).filter(function(f) {
        return ['count', 'source_pipeline', 'source_task', 'source_user'].indexOf(f.name) === -1;
      }).slice(0, 3);
      if (bodyFields.length) {
        const fieldsY = Math.max(pillY + 8, 92);
        bodyFields.forEach(function(f, i) {
          g.append('text')
            .attr('x', 16).attr('y', fieldsY + i * 12)
            .attr('font-size', 10)
            .attr('fill', isLight ? '#666' : '#999')
            .text(truncate(f.name + ': ' + (f.type || ''), 32));
        });
      }
    });

    // ── Selection wiring ───────────────────────────────────────────
    let selected = null;
    const selectionEl = document.getElementById('schema-selection');
    function applySelection() {
      svg.selectAll('.sd-node-box').classed('is-dim', false);
      svg.selectAll('.sd-edge-path').classed('is-hot', false).classed('is-dim', false);
      svg.selectAll('.sd-edge-label-bg').classed('is-hot', false).classed('is-dim', false);
      svg.selectAll('.sd-edge-label').classed('is-dim', false);
      if (selectionEl) selectionEl.textContent = '';
      if (!selected) return;

      if (selected.kind === 'node') {
        const name = selected.name;
        svg.selectAll('.sd-node-box').classed('is-dim', function() { return this.dataset.nodeType !== name; });
        svg.selectAll('.sd-edge-path').classed('is-hot', function() {
          return this.dataset.sourceType === name || this.dataset.targetType === name;
        }).classed('is-dim', function() {
          return this.dataset.sourceType !== name && this.dataset.targetType !== name;
        });
        svg.selectAll('.sd-edge-label-bg').each(function() {
          const id = this.getAttribute('data-edge-id');
          const path = svg.select('.sd-edge-path[data-edge-id="' + id + '"]').node();
          if (path) {
            this.classList.toggle('is-hot', path.classList.contains('is-hot'));
            this.classList.toggle('is-dim', path.classList.contains('is-dim'));
          }
        });
        svg.selectAll('.sd-edge-label').each(function() {
          const id = this.getAttribute('data-edge-id');
          const path = svg.select('.sd-edge-path[data-edge-id="' + id + '"]').node();
          if (path) this.classList.toggle('is-dim', path.classList.contains('is-dim'));
        });
        if (selectionEl) selectionEl.textContent = 'Selected node type: ' + name + ' — click again to clear';
      } else if (selected.kind === 'edge') {
        const id = selected.id;
        const edgePath = svg.select('.sd-edge-path[data-edge-id="' + id + '"]');
        const sourceType = edgePath.attr('data-source-type');
        const targetType = edgePath.attr('data-target-type');
        svg.selectAll('.sd-node-box').classed('is-dim', function() {
          return this.dataset.nodeType !== sourceType && this.dataset.nodeType !== targetType;
        });
        svg.selectAll('.sd-edge-path').classed('is-dim', function() { return this.getAttribute('data-edge-id') !== id; });
        edgePath.classed('is-dim', false).classed('is-hot', true);
        svg.select('.sd-edge-label-bg[data-edge-id="' + id + '"]').classed('is-hot', true);
        if (selectionEl) selectionEl.textContent = 'Selected edge: ' + sourceType + ' → ' + targetType + ' — click again to clear';
      }
    }
    svg.selectAll('.sd-node-box').on('click', function() {
      const name = this.dataset.nodeType;
      if (selected && selected.kind === 'node' && selected.name === name) { selected = null; }
      else { selected = { kind: 'node', name: name }; }
      applySelection();
    });
    svg.selectAll('.sd-edge-path, .sd-edge-label-bg, .sd-edge-label').on('click', function() {
      const id = this.getAttribute('data-edge-id');
      if (!id) return;
      if (selected && selected.kind === 'edge' && selected.id === id) { selected = null; }
      else { selected = { kind: 'edge', id: id }; }
      applySelection();
    });
  }


  // ── Empty / non-empty state plumbing ─────────────────────────────
  function setSchemaEmpty(message) {
    emptyEl.style.display = 'flex';
    emptyEl.querySelector('div').textContent = message || 'No schema configured for this dataset.';
    if (svgEl) svgEl.style.display = 'none';
    const hdr = document.getElementById('schema-header');
    const dia = document.getElementById('schema-diagram-section');
    if (hdr) hdr.style.display = 'none';
    if (dia) dia.style.display = 'none';
  }
  function hideSchemaEmpty() {
    emptyEl.style.display = 'none';
    if (svgEl) svgEl.style.display = '';
    const hdr = document.getElementById('schema-header');
    const dia = document.getElementById('schema-diagram-section');
    if (hdr) hdr.style.display = '';
    if (dia) dia.style.display = '';
  }

  window._renderSchemaGraph = function() {
    const model = buildSchemaModel();
    if (!model.nodeTypes.length) {
      setSchemaEmpty('No schema configured for this dataset.');
      const statsEl = document.getElementById('schema-stats');
      if (statsEl) statsEl.textContent = '';
      return;
    }
    hideSchemaEmpty();

    const totalInstances = model.nodeTypes.reduce(function(s, t) {
      return s + (t.instance_count || 0);
    }, 0);
    // Edge-type count = unique relation names (collapses multiple
    // source→target pairs that share a relation).
    const uniqueRels = new Set(model.edgeTypes.map(primaryRelation));
    const statsEl = document.getElementById('schema-stats');
    if (statsEl) {
      statsEl.textContent =
        model.nodeTypes.length + ' node types · ' +
        uniqueRels.size + ' edge types · ' +
        totalInstances + ' total instances';
    }

    renderSchemaDiagram(model);
  };

  if (!schemaData && (!schemaGraphData || !schemaGraphData.nodes || !schemaGraphData.nodes.length)) {
    setSchemaEmpty('No schema configured for this dataset.');
  }
})();

</script>

(function(){
"use strict";

var nodes = [{"name": "This chunk is about the CASA Enterprise Agreement 2023\u20132026, covering its purpose, coverage, definitions, flextime, and ", "type": "TextSummary", "ontology_valid": false, "version": 1, "topological_rank": 3, "metadata": {"index_fields": ["text"]}, "belongs_to_set": null, "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_node_set": null, "source_user": "default_user@example.com", "source_content_hash": "e0d487bebd7667976d5dfa142ba1c850", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "This chunk is about the CASA Enterprise Agreement 2023\u20132026, covering its purpose, coverage, definitions, flextime, and overtime rules.\n\n- Organizations: Civil Aviation Safety Authority (CASA), AFAP, ALAEA, CPSU, APESMA, Fair Work Commission\n- Concepts: Flextime credits/debits, overtime eligibility, overtime rates, emergency duty, time off in lieu, meal allowances, rest relief\n\nFacts:\n- The CASA Enterprise Agreement 2023\u20132026 commenced operation seven days after FWC approval, with a nominal expiry of 16 November 2026.\n- The Agreement covers all CASA employees under the Civil Aviation Act 1988, excluding the Director of Aviation Safety, Senior Managers, Medical Officers, contractors, and invigilators.\n- The maximum flex credit at the end of a settlement period is 30 hours for full-time employees.\n- The maximum flex debit at the end of a settlement period is 10 hours for full-time employees; excess debits are treated as unauthorised absence.\n- Overtime rates are: Monday\u2013Saturday time-and-a-half for the first 3 hours then double time; Sunday double time; public holidays double time and a half.\n- Employees must have a minimum of 8 consecutive hours off between ceasing overtime and recommencing work.\n- Emergency duty is paid at double time, with a minimum of 2 hours Monday\u2013Saturday and 3 hours on Sundays.", "summarized_in": null, "global_context_bucket_id": null, "id": "697a5ac4-52ee-52e8-a055-8be67ffe465a", "color": "#FFB454", "stage": "summary", "visual_rank": 3, "degree": 1, "importance": 0.18790182470910757, "label_priority": false, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_user": "default_user@example.com"}}, {"name": "Page 1: CIVIL AVIATION SAFETY AUTHORITY Enterprise Agreement 2023\u20132026 February 2024 Page 2: CASA Enterprise Agreement 2", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": null, "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": null, "source_user": "default_user@example.com", "source_content_hash": "e0d487bebd7667976d5dfa142ba1c850", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "Page 1:\n \n    \n \nCIVIL AVIATION SAFETY AUTHORITY Enterprise Agreement 2023\u20132026 \nFebruary 2024 \n\nPage 2:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n2 \nPART A \u2013 PURPOSE \n \n1. Purpose of this Agreement \n \n1.1. This Agreement deals comprehensively with the terms and conditions of employment in CASA \nfor employees covered by this Agreement. \nPART B \u2013 TECHNICAL MATTERS \n \n2. Title of this Agreement \n \n2.1. This Agreement will be known as the \u201cCivil Aviation Safety Authority Enterprise Agreement \n2023-2026\u201d and is made pursuant to section 172 of the FW Act. \n \n3. Persons covered by this Agreement \n3.1. This Agreement covers: \n \n3.1.1. the CEO/DAS, for and on behalf of the Commonwealth of Australia as the employer;  \n \n3.1.2. all employees in CASA employed under the Civil Aviation Act 1988 other than: \n \n3.1.2.1. the occupant of the Director of Aviation Safety under the Civil Aviation Act \n1988; \n3.1.2.2. CASA managers classified as Senior Managers or Medical Officers as \nprescribed by a determination of the Director or employees engaged under a \ncommon law contract; \n3.1.2.3. persons who are providing service to or within CASA (under a contract for \nservices) but who are employed or paid by a person or body other than CASA; \nand \n3.1.2.4. invigilators engaged by CASA from time to time. \n \n3.1.3. subject to notice being given in accordance with section 183 of the Fair Work Act \n2009, and the following employee organisations which were a bargaining \nrepresentative for this Agreement: \n \n3.1.3.1. Australian Federation of Air Pilots (AFAP) \n3.1.3.2. Australian Licensed Aircraft Engineers Association (ALAEA) \n3.1.3.3. Community and Public Sector Union (CPSU) \n3.1.3.4. Association of Professional Engineers, Scientists and Managers Australia \n(APESMA \u2013 Professionals Australia. \n \n4. Period of operation \n \n4.1. This Agreement will commence operation on the seventh day after the date on which FWC \napproves this Agreement. The nominal expiry date will be 16 November 2026. \n \n5. Delegations \n \n5.1. The CEO/DAS may delegate to or authorise any person to perform any or all of their powers \nand functions under this Agreement, including this power of delegation, and may do so subject \nto conditions. \n \n6. Definitions \n \n\nPage 3:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n3 \n6.1. For the purpose of this Agreement, unless the contrary intention appears: \n \nAward means the Australian Government Industry Award 2016 (or its successor) as varied from time \nto time.  \n \nCASA means the Civil Aviation Safety Authority. \n \nThe CASA capability framework describes the core capabilities that our employees need for CASA \nto achieve its outcomes in an increasingly complex and changing environment. The core capabilities \nare aligned to our Values, Work Level Standards and Training Pathways. \n \nCASA employment means continuous service with:  \ni. CASA and its predecessors; \nii. Australian Public Service; \niii. Parliamentary Service (Commonwealth); \niv. Australian Defence Forces; and/or \nv. Commonwealth authorities and bodies including those specified under regulation 8 of the \nLong Service Leave (Commonwealth Employees) Regulation 2016. \n \nCASA values mean those values set out in the Values and Code of Conduct Directive.  \n \nCEO/DAS means the Chief Executive Officer and Director of Aviation Safety, the occupant of the \noffice of Director of Aviation Safety appointed under section 74 of the Civil Aviation Act 1988.  \n \nChild means a biological child, adopted child, foster child, stepchild, or ward. \nCTM means Certificate Team Manager \nDe facto partner means a person who, regardless of gender, is living in a common household with \nthe employee in a bona fide, domestic, interdependent partnership, although not legally married to the \nemployee. \n \nDelegate means someone to whom a power or function has been delegated. \n \nDependant means the employee\u2019s spouse, or defacto partner, a child, a parent or aged relative of the \nemployee or the employee\u2019s spouse or de facto partner, who ordinarily lives with the employee and \nwho is substantially dependent upon the employee. Dependant also includes a child of the employee \nwho does not ordinarily live with the employee but for whom the employee provides substantial \nfinancial support.  \n \nEmployee means a person employed by CASA under the Civil Aviation Act 1988 on a full time or part \ntime basis, regardless of whether they are permanent employees, fixed term employees or casual \nemployees. \n \nEmployee representative means: \ni. an official, officer or employee of a registered union or industrial association; or  \nii. a workplace representative of a registered union or industrial association; or \niii. other representative(s) chosen or otherwise nominated by the employee(s) in a workplace \nto represent employee views to CASA. \n \nEmployer means CASA as represented by the CEO/DAS. \n\nPage 4:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n4 \nFamily and domestic violence has the same meaning as in section 106B(2) of the FW Act. \nFOI means Flying Operations Inspector. \nFTE means Flight Training Examiner. \nFWC means the Fair Work Commission. \nFW Act means the Fair Work Act 2009. \n \nHousehold member means any person who lives with the employee. \n \nImmediate family means: \n\u2022 a spouse, former spouse, de facto partner or former de facto partner of the employee;  \n\u2022 a child, parent, grandparent, grandchild, or sibling of the employee; \n\u2022 a child, parent, grandparent, grandchild, or sibling of a spouse, former spouse, de facto \npartner or former de facto partner of the employee; \n\u2022 a member of the employee\u2019s household; or \n\u2022 a person with whom the employee has a relationship of traditional kinship where there is a \nrelationship or obligation, under customs and traditions of the community or group to which \nthe employee belongs. \n \nLSL Act means the Long Service Leave Act 1976. \n \nManager means a manager or delegate who is an employee with operational responsibility for \nmanaging other employee/s. \n  \nNational Employment Standards means the standards set out in Part 2\u20132 of the FW Act. \n \nOvertime barrier refers to the classification level above which an employee would not be eligible to \nreceive overtime payments or similar allowances for working beyond the ordinary hours of work. The \nclassification level for this purpose in CASA is the Corporate Services Level 3 ( CSL3) or equivalent \nlevel. Classifications with a minimum salary point greater than the salary at CSL3 Pay Point G are \nabove the overtime barrier. \n \nPartner means a spouse or de facto partner. \n \nPrimary caregiver means a pregnant employee with an entitlement to paid or unpaid leave under \nclause 64, or an employee other than a casual employee who has primary care responsibility for a \nchild who is born to them or who is adopted or in long-term foster care as per the clauses on adoption \nand long-term foster care in this Agreement.  \n \nPS means Professional Services. \n \nSecondary caregiver means an employee, other than a pregnant employee or casual employee, \nwho has secondary care responsibility for a child who is born to them, or for a child who is adopted or \nin long-term foster care as per the clauses on adoption and long-term foster care in this Agreement.  \n \nSettlement Period means the four-week period, commencing every second payday, for flextime \npurposes. \n \nService has the same meaning as defined in s22 of the FW Act \n \n\nPage 5:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n23 \n35.5.3. An employee may take up to 4 days flex leave in each 4 week settlement period.  \n \n35.6. Flex credits \n \n35.6.1. An employee accumulates a flex credit where they work longer than the ordinary \nhours of work that apply to them on a particular day. Total flex credits are reduced \nwhere an employee works less than their ordinary hours of work on a particular day.  \n \n35.6.2. The maximum flex credit an employee is able to have at the end of a settlement \nperiod is 30 hours for a full time employee and a pro rata amount for a part time \nemployee. \n \n35.6.3. Where an employee has more than the maximum flex credit at the end of a settlement \nperiod, their flex credits will be reduced to the maximum from the start of the \nsubsequent settlement period unless the excess credit has been due to the \nemployee\u2019s manager rejecting an application for flex leave due to operational \nrequirements. In this case, the excess credit will be carried over to the next settlement \nperiod. \n \n35.7. Flex debits \n \n35.7.1. An employee accumulates a flex debit where they work less than the ordinary hours \nof work that apply to the employee. Total flex debits are reduced where an employee \nworks more than their ordinary hours of work. \n \n35.7.2. The maximum flex debit an employee is able to have at the end of a settlement period \nis 10 hours for full time employees and a pro rata amount for part time employees. An \nemployee is able to have more than the maximum flex debit during the settlement \nperiod as long as it is reduced to less than the maximum by the end of the settlement \nperiod. \n \n35.7.3. Where an employee has more than the maximum flex debits at the end of the \nsettlement period, the excess flex debits will be treated as an unauthorised absence, \nsalary will be deducted for the period of the absence and the employee\u2019s flex debits \nwill be reduced to the maximum from the start of the next settlement period. \n \n35.8. Impact of termination/separation on flex credits or debits \n \n35.8.1. So long as it is not inconsistent with section 326 of the FW Act, on termination of \nemployment an employee will not be paid out for unused flex credits or have salary \ndeducted for any flex debits. Managers and employees endeavour to reduce the \nflextime credits or flextime debits before the termination/separation from CASA.  \n \n36. Overtime \n \n36.1. Overtime eligibility \n \n36.1.1. Only employees at or below the Overtime barrier are eligible for the payment of \novertime subject to prior approval and the provisions of this clause. \n \n36.1.2. Employees above the Overtime barrier are expected to work reasonable additional \nhours beyond the ordinary hours of work without the payment of overtime. Approval \nmay be given for an employee above the Overtime barrier to be paid for overtime \nworked where such overtime is of an ongoing and significant nature and the \nemployee has been requested by their manager to work such overtime. \n \n\nPage 6:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n24 \n36.1.3. Subject to Section 62 of the FW Act, overtime may be approved where an eligible \nemployee is directed to work: \n \n36.1.3.1. Monday to Friday outside the span of hours \n \n36.1.3.2. on a Saturday or Sunday \n \n36.1.3.3. on a public holiday; or \n \n36.1.3.4. Monday to Friday, during the span of hours but more than 8 hours on the day \nconcerned, unless the employee has a flex debit at the time. \n \n36.1.4. In emergency situations, prior approval for overtime may not be possible. Where this \nis the case, the employee must seek authorisation for the overtime from their \nmanager as soon as possible after the overtime commences. \n \n36.1.5. Overtime may be approved for part time employees where the employee is directed to \nwork outside of their part time agreement.  \n \n36.2. Overtime rates \n \n36.2.1. The overtime rates are as follows: \n \n36.2.1.1. Monday to Saturday \u2013 time and a half for the first 3 hours and double time \nthereafter; \n \n36.2.1.2. Saturday (shift workers only) \u2013 double time; \n \n36.2.1.3. Sunday \u2013 double time; \n \n36.2.1.4. Public holiday \u2013 double time and a half. \n \n36.2.2. Where overtime extends into the next day, the overtime rate will be based on the \nactual day the work is undertaken rather than the day on which the overtime \ncommenced. \n \n36.2.3. For overtime on Monday to Saturday, double time starts after 3 hours overtime has \nbeen worked on that day, even where the overtime worked has been in separate \nperiods. \n \n36.2.4. Overtime is calculated to the nearest quarter of an hour of the total amount of \novertime for each overtime occurrence. \n \n36.3. Minimum payment for separate overtime attendances \n \n36.3.1. The minimum payment to apply where overtime is not continuous with ordinary hours \nof work is 4 hours. \n \n36.3.2. A meal break taken before overtime commences does not break continuity of work for \nthe purpose of clause 36.3.1. \n \n36.4. Meal allowance and meal breaks for overtime  \n \n36.4.1. An overtime meal allowance is payable where an employee is required to perform \novertime: \n\nPage 7:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n25 \n \n36.4.1.1. that is continuous with their ordinary hours of work without a meal break and it \nextends to the end of a meal period (see sub-clause 36.4.3); \n \n36.4.1.2. that is continuous with their ordinary hours of work and the employee has taken \nan unpaid meal break prior to commencing overtime; \n \n36.4.1.3. that is not continuous with their ordinary hours of work and is over and extends \nbeyond the end of a meal period, subject to the employee not receiving a paid \nmeal break. \n \n36.4.2. The overtime meal allowance is paid through the payroll system as per the ATO \nguidelines. The overtime meal allowance rate will be adjusted annually as advised by \nthe ATO.  \n \n36.4.3. For the purposes of determining overtime meal allowance, the specified meal periods \nare 7.00am to 9.00am, 12 noon to 2.00pm, 6.00pm to 7.00pm and Midnight to \n1.00am.  \n \n36.4.4. Employees are not entitled to a meal allowance if they are in receipt of travel \nallowance or temporary accommodation allowance that includes a meal component \nfor the meal break period.  \n \n36.4.5. An employee is also entitled to an overtime meal allowance where they are \nundertaking a short course of study at the request of CASA where:  \n \n36.4.5.1. time off work to undertake the study is less than 5 hours per week; and \n \n36.4.5.2. the course timetable prevents the employee from being able to have a meal at \nhome until after 8.00 pm. \n \n36.5. Rest relief after overtime \n \n36.5.1. Employees must have a minimum of 8 consecutive hours off work plus reasonable \ntravelling time, between ceasing overtime and recommencing work. Where an \nemployee has not been provided with this, they may be absent from work without loss \nof salary until they have had 8 consecutive hours off work. \n \n36.5.2. If an employee is required by CASA to resume work or continue without having 8 \nconsecutive hours off work, they will be paid double time for all hours worked until \nthey have had 8 consecutive hours off duty. \n \n36.5.3. These rest relief provisions only apply to breaks after approved overtime, except in \nrelation to: \n \n36.5.3.1. emergency duty unless the actual time worked on emergency duty is at least 3 \nhours on each call; or \n \n36.5.3.2. overtime not exceeding 3 hours that is worked immediately before the \ncommencement of an ordinary shift. \n \n36.6. Time off in lieu of payment for overtime \n \n36.6.1. Time in lieu can be used in place of overtime where both the employee and their \nmanager agree. The amount of time that is to be used as time in lieu is calculated at \n\nPage 8:\n \nCASA Enterprise Agreement 2023-2026  \n  \n \n26 \nthe overtime rates for duty performed on Monday to Friday and on a 1 for 1 basis for \nSaturdays, Sundays and Public Holidays.  \n \n36.6.2. The time in lieu is to be taken at a time that is mutually agreeable between the \nemployee and their manager. This should be within 4 weeks of the overtime having \nbeen worked and should not be more than 8 weeks after the overtime was worked.  \n \n36.6.3. Any unused time off in lieu accrued under sub-clause 36.6.1 held by an employee \nafter 8 weeks of working the overtime or at termination of their employment will be \npaid out at the overtime rate it was accrued at. Managers should make every effort to \nallow the employee to take the time in lieu during the 8-week period or before their \ntermination date. \n \n36.7. Overtime transport \n \n36.7.1. Where an employee works overtime at a time when there is no normal public \ntransport available, the employee may take a taxi from work to their home at CASA\u2019s \nexpense. \n \n37. Emergency duty  \n \n37.1. Emergency duty arrangements only apply to employees at or below the Overtime barrier.  \n \n37.2. Emergency duty is where an employee has ceased ordinary hours and they are called to work \nto meet an emergency and did not get notice of this additional duty before they finished their \nordinary hours. This does not include shift workers whose duty for that day is varied by \nalteration of commencement of the scheduled shift to meet an emergency.  \n \n37.3. All overtime that is classified as emergency duty is paid at double time and includes all time \nworked plus reasonable and necessary travel time to and from work. \n \n37.4. The minimum payment for emergency duty performed on Mondays through to Saturdays is 2 \nhours at double time. This minimum applies to each separate attendance. \n \n37.5. The minimum payment for emergency duty performed on Sundays is 3 hours at double time. \nWhere more than 1 attendance is required for emergency duty on a Sunday, a minimum \npayment of 3 hours should be made only for the first attendance. Any other emergency duty \nperformed on the Sunday attracts a minimum payment of 2 hours. \n \n37.6. On public holidays, emergency duty is paid at the normal overtime rate of double time and a \nhalf unless the employee is a shift worker in which case the shift penalties apply.  \n \n37.7. Motor vehicle allowance for emergency duty. \n \n37.7.1. Where an employee uses their own vehicle to travel to and from emergency duty, \nthey are entitled to motor vehicle allowance as set out in clause 42.  \n \n37.8. Rest relief after emergency duty \n \n37.8.1. Where an employee performs emergency duty the rest relief provisions under clause \n36.5 will apply. \n \n37.9. Meal Allowance for emergency duty \n \n37.9.1. Where an employee performs emergency duty during a meal period as specified in \nsub-clause 36.4.3 and they are unable to take a break then the employee is entitled to \n", "chunk_size": 7666, "chunk_index": 0, "cut_type": "sentence_cut", "id": "d763cf32-eeda-515f-ba67-69c36b85d673", "color": "#0DFF00", "stage": "chunk", "visual_rank": 2, "degree": 39, "importance": 1.0, "label_priority": true, "provenance": {"source_task": "extract_chunks_from_documents", "source_pipeline": "cognify_pipeline", "source_user": "default_user@example.com"}}, {"name": "casa-subset", "type": "TextDocument", "ontology_valid": false, "version": 1, "topological_rank": 1, "metadata": {"index_fields": ["name"]},   if(!hex)return[219,216,216];
  var c=hex.replace("#","");
  if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];

}

  return String(v).toLowerCase()==="true";
}
function numberValue(v){
  var n=Number(v);
  return Number.isFinite(n)?n:null;
}
function stableHash(value){
  var text=String(value||"");
  var hash=0;
  for(var i=0;i<text.length;i++){hash=((hash<<5)-hash+text.charCodeAt(i))|0}
  return Math.abs(hash);
}

var hasMeaningfulTopologicalRank=nodes.some(function(n){
  var rank=numberValue(n.topological_rank);
  return rank!==null&&rank!==0;
});
var maxGlobalContextLevel=0;
nodes.forEach(function(n){
  if(n.type==="GlobalContextSummary"&&!boolValue(n.is_root)){
    var level=numberValue(n.level);
    if(level!==null)maxGlobalContextLevel=Math.max(maxGlobalContextLevel,level);
  }
});

function inferLayoutCategory(n){
  if(hasMeaningfulTopologicalRank){
    var rank=numberValue(n.topological_rank);
    return "Rank "+(rank===null?0:rank);
  }
  if(n.type==="TextDocument")return "Document";
  if(n.type==="DocumentChunk")return "Chunk";
  if(n.type==="TextSummary")return "Summary";
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return "Context Root";
    var level=numberValue(n.level);
    return "Context L"+(level===null?0:level);
  }
  if(n.type==="Entity")return "Entity";
  if(n.type==="EntityType")return "Type";
  if(n.type==="DatabaseSchema")return "Database";
  if(n.type==="SchemaTable"||n.type==="TableType")return "Table";
  if(n.type==="SchemaRelationship")return "Schema Rel";
  if(n.type==="TableRow")return "Row";
  if(n.type==="ColumnValue")return "Column";
  return n.type||"Node";
}

function inferLayoutRank(n){
  if(hasMeaningfulTopologicalRank){
    var rank=numberValue(n.topological_rank);
    if(rank!==null)return rank;
  }
  if(n.type==="TextDocument")return 0;
  if(n.type==="DocumentChunk")return 1;
  if(n.type==="TextSummary")return 2;
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return 4+maxGlobalContextLevel;
    var level=numberValue(n.level);
    return 3+(level===null?0:level);
  }
  if(n.type==="Entity")return 3;
  if(n.type==="EntityType")return 4;
  if(n.type==="DatabaseSchema")return 0;
  if(n.type==="SchemaTable"||n.type==="TableType")return 1;
  if(n.type==="SchemaRelationship")return 2;
  if(n.type==="TableRow")return 2;
  if(n.type==="ColumnValue")return 3;
  if(n.source_task&&String(n.source_task).indexOf("extract_chunks")>=0)return 1;
  if(n.source_task&&String(n.source_task).indexOf("summar")>=0)return 2;
  if(n.source_task&&String(n.source_task).indexOf("graph")>=0)return 3;
  return 3;
}

function layoutLaneKey(n){
  if(n.source_content_hash)return n.source_content_hash;
  if(n.source_node_set)return n.source_node_set;
  if(n.type==="GlobalContextSummary")return n.type+":"+(n.level||0)+":"+(n.id||n.name);
  if(n.type==="EntityType")return n.name||n.id;
  return (n.type||"Node")+":"+(n.name||n.id);
}

function labelForRank(rankStats){
  var entries=Object.keys(rankStats).sort(function(a,b){
    return rankStats[b]-rankStats[a]||a.localeCompare(b);
  });
  if(entries.length===0)return "Nodes";
  if(entries.length>1&&rankStats[entries[1]]/rankStats[entries[0]]>=0.25){
    return entries[0]+" / "+entries[1];
  }
  return entries[0];
}

// ── Pipeline (Story) layout — bins nodes by preprocessor.stage ──
// Each stage becomes one vertical column laid left-to-right in the
// canonical order set by preprocessor.STAGE_ORDER. Within each column
// nodes are sorted by (visual_rank, importance desc). Falls back to
// computeRankedLayout() for graphs without preprocessor stage info.
var STORY_STAGE_ORDER=["document","chunk","entity","type","summary","context","schema","other"];
var STORY_STAGE_LABEL={
  document:"Documents",
  chunk:"Chunks",
  entity:"Entities",
  type:"Types",
  summary:"Summaries",
  context:"Context",
  schema:"Schema",
  other:"Other",
};
function computePipelineLayout(){
  var stageCounts={};
  nodes.forEach(function(n){
    var s=n.stage||"other";
    stageCounts[s]=(stageCounts[s]||0)+1;
  });
  var presentStages=STORY_STAGE_ORDER.filter(function(s){return stageCounts[s]>0});
  if(presentStages.length<2){
    computeRankedLayout();
    return;
  }
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=presentStages.map(function(stage,index){
    return {
      rank: index,
      index: index,
      x: (index-(presentStages.length-1)/2)*rankColumnGap,
      label: STORY_STAGE_LABEL[stage]+" ("+stageCounts[stage]+")",
      stage: stage,
    };
  });
  var stageIndexMap={};
  presentStages.forEach(function(stage,index){stageIndexMap[stage]=index});

  var byStage={};
  presentStages.forEach(function(s){byStage[s]=[]});
  nodes.forEach(function(n){
    var s=n.stage||"other";
    if(!byStage[s])byStage[s]=[];
    byStage[s].push(n);
  });
  presentStages.forEach(function(stage){
    byStage[stage].sort(function(a,b){
      var ra=numberValue(a.visual_rank)||0;
      var rb=numberValue(b.visual_rank)||0;
      if(ra!==rb)return ra-rb;
      return (b.importance||0)-(a.importance||0);
    });
  });

  // Dense stages (e.g. 200+ entities on the Alice book) get packed into
  // multiple sub-columns within their stage's allotted horizontal slot,
  // so the vertical span stays readable and auto-fit doesn't crush
  // everything to 0.05x zoom. Sub-column gap is kept tight (≤ 28px) so
  // each stage still reads as ONE cluster, not as multiple stages.
  //
  // Lane spacing has to clear the LARGEST possible importance-scaled
  // node diameter so high-importance nodes (impFactor up to 1.5 → radius
  // up to ~21px → diameter ~42px) don't overlap their neighbors. We add
  // a 12px breathing margin on top of that floor.
  var laneSpacing=N>1000?32:N>300?40:N>120?52:64;
  var MAX_ROWS_PER_SUBCOL=36;
  presentStages.forEach(function(stage){
    var colIdx=stageIndexMap[stage];
    var column=rankColumns[colIdx];
    var colNodes=byStage[stage];
    var n=colNodes.length;
    var subCols=Math.max(1,Math.ceil(n/MAX_ROWS_PER_SUBCOL));
    var rowsPerSub=Math.ceil(n/subCols);
    // Sub-column gap deliberately tight (max 28px) so the cluster reads
    // as a single stage, not as multiple stages. Constrain total cluster
    // width to ~55% of the stage slot — leaves clear gutters either side.
    var maxClusterW=rankColumnGap*0.55;
    var subGap=subCols>1?Math.min(28,maxClusterW/(subCols-1)):0;
    var totalHeight=(rowsPerSub-1)*laneSpacing;
    var startY=-totalHeight/2;
    var startSubX=column.x-(subCols-1)*subGap/2;
    colNodes.forEach(function(node,i){
      var sub=Math.floor(i/rowsPerSub);
      var row=i%rowsPerSub;
      node._layoutRank=colIdx;
      node._layoutCategory=STORY_STAGE_LABEL[stage];
      node._targetX=startSubX+sub*subGap;
      node._targetY=startY+row*laneSpacing;
      if(typeof node.x!=="number"||!isFinite(node.x)){
        var jitter=(stableHash(node.id)%100)/100-0.5;
        node.x=node._targetX+jitter*Math.max(subGap,12)*0.3;
        node.y=node._targetY+jitter*laneSpacing;
      }
      // Pin BOTH x and y in Story mode — the layout is meant to be a
      // clean deterministic grid (one row per node within each stage
      // column). Letting y float lets link forces pull connected nodes
      // toward each other, which collapsed nodes onto neighbors. Fully
      // pinned + sufficient laneSpacing = no overlap. Cleared by
      // applyLayoutMode on switch to Flow / Force / Organic layouts.
      node.fx=node._targetX;
      node.fy=node._targetY;
    });
  });
}

function computeRankedLayout(){
  var rankStats={};
  nodes.forEach(function(n){
    var rank=inferLayoutRank(n);
    var category=inferLayoutCategory(n);
    n._layoutRank=rank;
    n._layoutCategory=category;
    if(!rankStats[rank])rankStats[rank]={};
    rankStats[rank][category]=(rankStats[rank][category]||0)+1;
  });

  var ranks=Object.keys(rankStats).map(Number).sort(function(a,b){return a-b});
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=ranks.map(function(rank,index){
    return {
      rank: rank,
      index: index,
      x: (index-(ranks.length-1)/2)*rankColumnGap,
      label: labelForRank(rankStats[rank]),
    };
  });

  var rankIndexByValue={};
  rankColumns.forEach(function(column,index){rankIndexByValue[column.rank]=index});
  var laneSpacing=N>1000?34:N>300?44:58;
  nodes.forEach(function(n){
    var column=rankColumns[rankIndexByValue[n._layoutRank]];
    var hash=stableHash(layoutLaneKey(n));
    var laneCount=N>1500?17:N>500?13:9;
    var lane=hash%laneCount-Math.floor(laneCount/2);
    var jitter=(stableHash(n.id)%100)/100-0.5;
    n._targetX=column?column.x:0;
    n._targetY=lane*laneSpacing+jitter*laneSpacing*0.35;
    if(typeof n.x!=="number"||!isFinite(n.x)){
      n.x=n._targetX+jitter*rankColumnGap*0.25;
      n.y=n._targetY+jitter*laneSpacing;
    }
  });
}

function computeOrganicLayout(){
  var counts={};
  nodes.forEach(function(n){
    var type=n.type||"Node";
    counts[type]=(counts[type]||0)+1;
  });

  var types=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]||a.localeCompare(b)});
  var radius=clamp(Math.sqrt(N)*20,180,520);
  organicClusters=types.map(function(type,index){
    var angle=types.length===1?0:-Math.PI/2+index*Math.PI*2/types.length;
    var clusterRadius=clamp(64+Math.sqrt(counts[type])*9,96,240);
    return {
      type:type,
      count:counts[type],
      x:types.length===1?0:Math.cos(angle)*radius,
      y:types.length===1?0:Math.sin(angle)*radius,
      radius:clusterRadius,
    };
  });

  var clusterByType={};
  organicClusters.forEach(function(cluster){clusterByType[cluster.type]=cluster});
  nodes.forEach(function(n){
    var cluster=clusterByType[n.type||"Node"]||{x:0,y:0,radius:120};
    var angleHash=stableHash((n.id||n.name||"")+":angle")%6283/1000;
    var distHash=(stableHash((n.id||n.name||"")+":distance")%1000)/1000;
    var localRadius=Math.sqrt(distHash)*cluster.radius*0.62;
    n._organicX=cluster.x+Math.cos(angleHash)*localRadius;
    n._organicY=cluster.y+Math.sin(angleHash)*localRadius;
  });
}
if(layoutMode==="story")computePipelineLayout();else computeRankedLayout();

function recolorNodes(){
  nodes.forEach(function(n){
    if(colorByMode==="type"){

    }else if(colorByMode==="task"){

    if(colorByMode==="type"&&n.ontology_valid===true){
      n.color="#D8D8D8";
      n._rgb=[216,216,216];
    }else{
      // Recache RGB
      if(n.color.indexOf("hsl")===0){
        var m=n.color.match(/[\d.]+/g);
        n._rgb=hslToRgb(+m[0],+m[1],+m[2]);
      }else{
        n._rgb=hexToRgb(n.color);
      }
    }
  });
}

// ── Transform state ──
var tx=W/2,ty=H/2,scale=1;

// ── Smooth zoom animation state ──
var zoomAnim=null; // {fromScale,toScale,fromTx,toTx,fromTy,toTy,startTime,duration}

function animateZoom(){
  if(!zoomAnim)return;
  var elapsed=performance.now()-zoomAnim.startTime;
  var t=Math.min(1,elapsed/zoomAnim.duration);
  // Ease out cubic
  var e=1-Math.pow(1-t,3);
  scale=lerp(zoomAnim.fromScale,zoomAnim.toScale,e);
  tx=lerp(zoomAnim.fromTx,zoomAnim.toTx,e);
  ty=lerp(zoomAnim.fromTy,zoomAnim.toTy,e);
  draw();
  if(t<1){requestAnimationFrame(animateZoom)}
  else{zoomAnim=null}
}

function smoothZoomTo(newScale,pivotX,pivotY,duration){
  newScale=clamp(newScale,0.02,30);
  var ratio=newScale/scale;
  var newTx=pivotX-(pivotX-tx)*ratio;
  var newTy=pivotY-(pivotY-ty)*ratio;
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||150};
  requestAnimationFrame(animateZoom);
}

function smoothPanZoomTo(newScale,newTx,newTy,duration){
  newScale=clamp(newScale,0.02,30);
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||300};
  requestAnimationFrame(animateZoom);
}

// ── Zoom-to-fit ──
function zoomToFit(animated){
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  var valid=0;
  nodes.forEach(function(n){
    if(typeof n.x!=="number"||!isFinite(n.x))return;
    valid++;
    if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
  });
  if(valid===0){return}
  var pad=0.06;
  var gw=maxX-minX||100;
  var gh=maxY-minY||100;
  var cx=(minX+maxX)/2;
  var cy=(minY+maxY)/2;
  var sx=W*(1-2*pad)/gw;
  var sy=H*(1-2*pad)/gh;
  // Hard floor so a sprawling graph still renders nodes at a readable
  // size — user can pan to see anything outside the viewport.
  var MIN_FIT_SCALE=0.55;
  var ns=Math.max(MIN_FIT_SCALE,Math.min(sx,sy,10));
  var ntx=W/2-cx*ns;
  var nty=H/2-cy*ns;
  if(animated){smoothPanZoomTo(ns,ntx,nty,400)}
  else{scale=ns;tx=ntx;ty=nty;draw()}
}

// ── Force simulation (Phase 3f: adaptive tuning) ──
var repStr,linkDist,alphaDecayVal,velDecayVal,distMaxVal,collideIter;
if(N>10000){
  repStr=-20;linkDist=20;alphaDecayVal=0.05;velDecayVal=0.6;distMaxVal=200;collideIter=0;
}else if(N>5000){
  repStr=-40;linkDist=30;alphaDecayVal=0.04;velDecayVal=0.5;distMaxVal=300;collideIter=0;
}else if(N>2000){
  repStr=-60;linkDist=40;alphaDecayVal=0.03;velDecayVal=0.45;distMaxVal=400;collideIter=1;
}else if(N>500){
  repStr=-120;linkDist=70;alphaDecayVal=0.02;velDecayVal=0.4;distMaxVal=500;collideIter=1;
}else{
  repStr=-180;linkDist=100;alphaDecayVal=0.02;velDecayVal=0.4;distMaxVal=600;collideIter=1;
}

  .force("link",d3.forceLink(links).id(function(d){return d.id}).distance(linkDist).strength(0.2))
  .force("charge",d3.forceManyBody().strength(repStr).distanceMax(distMaxVal))
  .force("center",d3.forceCenter(0,0))
  .force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22))
  .force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08))
  .alphaDecay(alphaDecayVal)
  .velocityDecay(velDecayVal);

if(collideIter>0){

function applyLayoutMode(restart){
  if(layoutMode==="story")computePipelineLayout();
  else computeRankedLayout();
  // story mode reuses the column-layout positioning machinery; both
  // "ranked" (by topological_rank) and "story" (by preprocessor.stage)
  // produce rankColumns and per-node _targetX/_targetY.
  if((layoutMode==="ranked"||layoutMode==="story")&&rankColumns.length>1){
    // Pin both axes in Story mode (computePipelineLayout already did
    // this but applyLayoutMode may be invoked after a flow-mode unpin,
    // so re-pin here defensively). Other layouts must unpin.
    if(layoutMode==="story"){
      nodes.forEach(function(n){
        if(typeof n._targetX==="number")n.fx=n._targetX;
        if(typeof n._targetY==="number")n.fy=n._targetY;
      });
    }else{
      nodes.forEach(function(n){n.fx=null;n.fy=null});
    }
    simulation.force("link").distance(linkDist).strength(0.2);
    simulation.force("charge").strength(repStr);
    simulation.force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22));
    simulation.force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08));
  }else{
    // Organic / Force mode — clear any pinned coords from a previous
    // Story-mode run so the simulation can move nodes anywhere.
    nodes.forEach(function(n){n.fx=null;n.fy=null});
    // Force-mode semantic tuning (Phase 1 polish, Codex critique). Three
    // signals layered on top of the legacy organic layout:
    //  - Per-link strength: structural relations are LOOSER (entities can
    //    drift away from their chunk-containment skeleton) so semantic
    //    edges aren't drowned out. Semantic links pull TIGHTER, surfacing
    //    real connections.
    //  - Per-node charge: hubs (high-degree nodes) repel more strongly
    //    proportional to log(degree), spreading them out so they stop
    //    occluding their neighbors.
    //  - Per-link distance: structural links allowed to stretch further.
    computeOrganicLayout();
    simulation.force("link")
      .distance(function(l){return l.edge_class==="semantic"?linkDist*0.9:linkDist*1.5})
      .strength(function(l){return l.edge_class==="semantic"?0.32:0.06});
    simulation.force("charge").strength(function(d){
      var deg=d._degree||0;
      return repStr*(1+Math.log(1+deg)*0.45);
    });
    simulation.force("x",d3.forceX(function(d){return d._organicX||0}).strength(0.075));
    simulation.force("y",d3.forceY(function(d){return d._organicY||0}).strength(0.075));
  }
  if(restart){
    simDone=false;
    simTickCount=0;
    simulation.alpha(0.8).restart();
    draw();
  }
}

function rebuildQuadtree(){
  quadtree=d3.quadtree()
    .x(function(d){return d.x})
    .y(function(d){return d.y})

var adjMap={};
nodes.forEach(function(n){adjMap[n.id]=[]});

// Simulation tick handler
simulation.on("tick",function(){
  simTickCount++;

  // Rebuild adjacency once after link objects are resolved
  if(simTickCount===1){
    adjMap={};
    nodes.forEach(function(n2){adjMap[n2.id]=[]});
    links.forEach(function(l){
      var sid=l.source.id||l.source;
      var tid=l.target.id||l.target;
      if(adjMap[sid])adjMap[sid].push(tid);
      if(adjMap[tid])adjMap[tid].push(sid);
    });
  }

  // Rebuild quadtree periodically
  if(simTickCount%qtRebuildInterval===0){rebuildQuadtree()}

  // Update loading progress
  if(showLoading&&!simDone){
    var pct=Math.min(99,Math.round(simTickCount/MAX_TICKS*100));
    loadingBar.style.width=pct+"%";
    loadingText.textContent="Laying out graph... "+pct+"%";
  }

  // Cap simulation ticks
  if(simTickCount>=MAX_TICKS&&!simDone){
    simulation.stop();
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
    return;
  }

  // Only draw during simulation if small graph, otherwise skip frames
  if(N<2000||simTickCount%3===0){draw()}
});

// When simulation ends naturally (alpha < alphaMin)
simulation.on("end",function(){
  if(!simDone){
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
  }
});

function inspectorSection(id,title,openByDefault,body){
